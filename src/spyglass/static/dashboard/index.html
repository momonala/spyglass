<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spyglass</title>
    <link rel="stylesheet" href="/dashboard/static/css/shared.css" />
    <link rel="stylesheet" href="/dashboard/static/css/components.css" />
    <link rel="stylesheet" href="/dashboard/static/css/dashboard.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.30/dist/uPlot.min.css" />
  </head>
  <body>
    <header class="toolbar">
      <div class="toolbar__brand">
        <h1>Spyglass</h1>
        <p class="toolbar__subtitle">Metrics dashboard</p>
      </div>
      <div class="toolbar__controls">
        <label class="field">
          <span>Project</span>
          <select id="project-select" aria-label="Project"></select>
        </label>
        <label class="field">
          <span>Range</span>
          <select id="range-select" aria-label="Time range">
            <option value="1h">Last 1 hour</option>
            <option value="6h">Last 6 hours</option>
            <option value="24h" selected>Last 24 hours</option>
            <option value="all">All data</option>
          </select>
        </label>
        <button id="add-widget-btn" type="button" class="btn btn--primary">Add widget</button>
        <button id="save-layout-btn" type="button" class="btn">Save</button>
      </div>
    </header>

    <main>
      <div id="status-banner" class="status-banner" hidden></div>
      <section id="widget-grid" class="widget-grid" aria-live="polite"></section>
      <p id="empty-state" class="empty-state">No widgets yet. Add one to get started.</p>
    </main>

    <dialog id="add-widget-dialog" class="modal">
      <form id="add-widget-form" method="dialog">
        <header class="modal__header">
          <h2>Add widget</h2>
          <button type="button" id="close-dialog-btn" class="btn btn--ghost" aria-label="Close">
            ✕
          </button>
        </header>
        <label class="field">
          <span>Metric</span>
          <input id="metric-search" type="search" placeholder="Search metrics..." autocomplete="off" style="margin-bottom: 0.5rem; width: 100%;">
          <select id="metric-select" required></select>
        </label>
        <label class="field">
          <span>Widget type</span>
          <select id="widget-type-select" required></select>
        </label>
        <label class="field">
          <span>Title</span>
          <input id="widget-title-input" type="text" placeholder="Optional display title" />
        </label>
        <footer class="modal__footer">
          <button type="submit" class="btn btn--primary">Add</button>
        </footer>
      </form>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.30/dist/uPlot.iife.min.js"></script>
    <script type="module" src="/dashboard/static/js/main.js"></script>
  </body>
</html>
