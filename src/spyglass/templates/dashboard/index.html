<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboards · Spyglass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/static/css/shared.css">
  <link rel="stylesheet" href="/dashboard/static/css/components.css">
</head>
<body>
<nav class="sidebar" aria-label="Project navigation">
  <div class="sidebar-brand">
    <a class="sidebar-brand-link" href="/dashboard/">spyglass</a>
  </div>
  <div class="sidebar-nav">
    <span class="sidebar-section-label">Dashboards</span>
    {% for project in projects %}
    <a class="sidebar-link" href="/dashboard/{{ project }}">{{ project }}</a>
    {% endfor %}
  </div>
</nav>
<header class="page-header">
  <div class="header-row">
    <div>
      <p class="eyebrow">spyglass</p>
      <h1>Dashboards</h1>
    </div>
  </div>
</header>
<main>
  <div class="index-grid">
    {% for project in projects %}
    <a class="project-link" href="/dashboard/{{ project }}">{{ project }}</a>
    {% endfor %}
  </div>
</main>
</body>
</html>
